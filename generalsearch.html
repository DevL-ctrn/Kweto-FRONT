<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KwetoBread - Pesquisa de Produtos ou Padarias</title>
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg:           #ffffff;
    --fg:           #000000;
    --card:         #ffffff;
    --muted:        #F2F2F7;
    --muted-fg:     #8E8E93;
    --border:       rgba(0,0,0,.10);
    --amber:        #92400e;
    --amber-light:  #b45309;
    --amber-badge:  #d97706;
    --amber-bg:     rgba(146,64,14,.08);
    --green:        #16a34a;
    --red:          #dc2626;
    --radius:       0.75rem;
    --shadow-sm:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --shadow-md:    0 4px 12px rgba(0,0,0,.10), 0 2px 4px rgba(0,0,0,.06);
    --shadow-lg:    0 10px 24px rgba(0,0,0,.12), 0 4px 8px rgba(0,0,0,.06);
    --transition:   200ms ease;
  }

  html { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; font-size: 16px; }
  body { background: #ffffff; color: var(--fg); min-height: 100vh; }

  /* ── Sticky search bar ── */
  .search-bar {
    position: sticky; top: 0; z-index: 40;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }
  .search-bar-inner {
    max-width: 640px; margin: 0 auto;
    display: flex; align-items: center; gap: 12px;
  }
  .btn-back {
    flex-shrink: 0; width: 36px; height: 36px;
    border: none; background: transparent; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--fg); transition: background var(--transition);
  }
  .btn-back:hover { background: var(--muted); }
  .btn-back svg { width: 20px; height: 20px; }

  .search-wrap {
    position: relative; flex: 1;
  }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    pointer-events: none; color: var(--muted-fg); width: 16px; height: 16px;
  }
  .search-input {
    width: 100%; height: 40px;
    padding: 0 36px 0 36px;
    background: var(--muted); border: 1.5px solid #d4a017; outline: none;
    border-radius: 12px; font-size: 15px; color: var(--fg);
    transition: box-shadow var(--transition);
  }
  .search-input::placeholder { color: var(--muted-fg); }
  .search-input:focus { box-shadow: none; outline: none; }
  .search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted-fg); display: none; align-items: center;
    padding: 2px; transition: color var(--transition);
  }
  .search-clear:hover { color: var(--fg); }
  .search-clear.visible { display: flex; }
  .search-clear svg { width: 16px; height: 16px; }

  /* ── Main content ── */
  .main {
    max-width: 640px; margin: 0 auto;
    padding: 16px 16px 48px;
  }

  .btn-map {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600;
    padding: 0 14px; height: 32px;
    background: #ffffff; border: 1.5px solid #c8860a;
    border-radius: 8px; cursor: pointer; color: #92400e;
    transition: background var(--transition);
  }
  .btn-map:hover { background: #fdf8f0; }
  .btn-map i { font-size: 13px; }
  /* ── Toolbar (count + filter button) ── */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .result-count { font-size: 13px; color: var(--muted-fg); }
  .result-count strong { color: var(--amber); font-weight: 600; }

  .btn-filter {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600;
    padding: 0 14px; height: 32px;
    background: #ffffff; border: 1.5px solid #d4a017;
    border-radius: 8px; cursor: pointer; color: #92400e;
    transition: background var(--transition);
  }
  .btn-filter:hover { background: #fdf8f0; }
  .btn-filter.active { background: #fdf8f0; }
  .btn-filter svg { width: 14px; height: 14px; }

  /* ── Filter Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,.45);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 200ms ease;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }
  .modal-sheet {
    background: #ffffff; width: 100%; max-width: 480px;
    border-radius: 20px 20px 0 0;
    max-height: 85vh; overflow-y: auto;
    transform: translateY(100%);
    transition: transform 250ms ease;
    box-shadow: 0 -8px 30px rgba(0,0,0,.2);
  }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  @media (min-width: 640px) {
    .modal-overlay { align-items: center; }
    .modal-sheet { border-radius: 20px; transform: translateY(20px) scale(.97); }
    .modal-overlay.open .modal-sheet { transform: translateY(0) scale(1); }
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: #ffffff; z-index: 1;
  }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--fg); }
  .modal-close {
    width: 32px; height: 32px; border-radius: 50%;
    border: none; background: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--fg); font-size: 14px;
    transition: background var(--transition);
  }
  .modal-close:hover { background: #e5e5ea; }
  .modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 24px; }
  .modal-section { display: flex; flex-direction: column; gap: 10px; }
  .modal-label {
    font-size: 13px; font-weight: 600; color: var(--fg);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-label-value { font-size: 13px; font-weight: 700; color: #92400e; }
  .modal-footer {
    display: flex; gap: 10px; padding: 16px 20px;
    border-top: 1px solid var(--border);
    position: sticky; bottom: 0; background: #ffffff;
  }
  .btn-clear-modal {
    flex: 1; height: 44px; border-radius: 12px;
    border: 1px solid var(--border); background: #ffffff;
    font-size: 14px; font-weight: 600; color: var(--fg);
    cursor: pointer; transition: background var(--transition);
  }
  .btn-clear-modal:hover { background: var(--muted); }
  .btn-apply-modal {
    flex: 2; height: 44px; border-radius: 12px;
    background: #ffffff; border: 1.5px solid #d4a017;
    font-size: 14px; font-weight: 700; color: #92400e;
    cursor: pointer; transition: opacity var(--transition);
  }
  .btn-apply-modal:hover { opacity: .8; }


  /* ── Tabs ── */
  .tabs {
    display: flex; border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .tab-btn {
    flex: 1; padding-bottom: 10px;
    background: none; border: none; cursor: pointer;
    font-size: 14px; font-weight: 500;
    color: var(--muted-fg);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    position: relative; transition: color var(--transition);
  }
  .tab-btn.active { color: var(--amber); }
  .tab-btn::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px; background: var(--amber);
    border-radius: 2px 2px 0 0;
    transform: scaleX(0); transition: transform 220ms ease;
  }
  .tab-btn.active::after { transform: scaleX(1); }
  .tab-count {
    font-size: 11px; padding: 2px 6px;
    border-radius: 100px; font-weight: 500;
  }
  .tab-btn.active .tab-count { background: var(--amber-bg); color: var(--amber); }
  .tab-btn:not(.active) .tab-count { background: var(--muted); color: var(--muted-fg); }

  /* ── Filter chips ── */
  .filter-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .chip {
    padding: 6px 14px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
    border: 1px solid var(--border);
    background: #ffffff; color: var(--muted-fg);
    cursor: pointer; transition: all var(--transition);
  }
  .chip:hover { border-color: #92400e; }
  .chip.active { background: #ffffff; color: #92400e; border-color: #d4a017; font-weight: 700; }

  .range-input { width: 100%; accent-color: #92400e; cursor: pointer; }
  .range-ticks {
    display: flex; justify-content: space-between;
    font-size: 11px; color: var(--muted-fg); margin-top: 4px;
  }

  /* ── Tab content panels ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Empty state ── */
  .empty {
    text-align: center; padding: 64px 0;
    color: var(--muted-fg); font-size: 14px;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* ── Product grid (2 cols) ── */
  /* ── Product grid (2 cols) ── */
  .product-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .product-card {
    background: #ffffff;
    border: 1.5px solid #c8860a;
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow var(--transition), transform var(--transition);
    animation: fadeUp .25s ease both;
  }
  .product-card:hover {
    box-shadow: 0 8px 24px rgba(146,64,14,.18);
    transform: translateY(-2px);
  }
  .product-card:hover .product-img { transform: scale(1.05); }
  .product-img-wrap { position: relative; overflow: hidden; border-radius: 18px 18px 0 0; }
  .product-img {
    width: 100%; height: 148px; object-fit: cover;
    display: block; transition: transform 350ms ease;
  }
  .product-tag {
    position: absolute; top: 10px; left: 10px;
    background: #d4a017; color: #1a1a1a;
    font-size: 10px; font-weight: 700;
    letter-spacing: .04em;
    padding: 4px 10px; border-radius: 100px;
    text-transform: uppercase;
  }
  .btn-add {
    position: absolute; bottom: 10px; right: 10px;
    width: 34px; height: 34px;
    background: #92400e; color: #fff;
    border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
    transition: background var(--transition), transform var(--transition);
  }
  .btn-add:hover { background: #78350f; transform: scale(1.1); }
  .btn-add svg { width: 18px; height: 18px; }
  .product-info { padding: 12px 12px 14px; }
  .product-category {
    font-size: 10px; font-weight: 700;
    color: #92400e; text-transform: uppercase;
    letter-spacing: .06em; margin-bottom: 4px;
  }
  .product-name {
    font-size: 15px; font-weight: 700;
    color: var(--fg); line-height: 1.25;
    margin-bottom: 4px;
  }
  .product-bakery-name {
    font-size: 11px; color: #92400e; font-weight: 500;
    margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .product-bakery-name i { margin-right: 3px; }
  .product-sold {
    font-size: 11px; color: var(--muted-fg);
    margin-bottom: 8px;
  }
  .product-stats {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 10px;
  }
  .pstat {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--fg); font-weight: 500;
  }
  .pstat svg { width: 14px; height: 14px; color: #92400e; flex-shrink: 0; }
  .price {
    font-size: 18px; font-weight: 800;
    color: #92400e;
  }

  /* ── Bakery list ── */
  .bakery-list { display: flex; flex-direction: column; gap: 12px; }
  .bakery-card {
    background: #ffffff; border: 1.5px solid #c8860a;
    border-radius: 20px; padding: 16px;
    display: flex; align-items: center; gap: 16px;
    cursor: pointer; transition: box-shadow var(--transition), transform var(--transition);
    animation: fadeUp .25s ease both;
  }
  .bakery-card:hover {
    box-shadow: 0 8px 24px rgba(120,53,15,.18);
    transform: translateY(-2px);
  }
  .bakery-logo {
    flex-shrink: 0; width: 64px; height: 64px;
    border-radius: 14px; overflow: hidden;
    background: linear-gradient(135deg, #92400e, #b45309);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .bakery-logo img { width: 100%; height: 100%; object-fit: cover; }

  .bakery-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .bakery-name { font-weight: 700; font-size: 15px; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .bakery-specialty { font-size: 11px; color: #92400e; font-weight: 600; text-transform: uppercase; letter-spacing:.04em; margin-bottom:4px; }
.bcard-stat-row{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted-fg);margin-bottom:3px;flex-wrap:nowrap;overflow:visible;}
  .bakery-stats {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted-fg); flex-wrap: nowrap; white-space: nowrap; margin-bottom: 6px;
  }
  .bakery-stats svg { width: 12px; height: 12px; }
  .dot { color: rgba(0,0,0,.2); }
  .bakery-addr { display: flex; align-items: flex-start; gap: 4px; font-size: 11px; color: var(--muted-fg); }
  .bakery-addr svg { width: 11px; height: 11px; flex-shrink: 0; margin-top: 2px; color: #b45309; }
  .addr-province { font-size: 10px; opacity: .7; }

  .bakery-right {
    flex-shrink: 0;
    display: flex; flex-direction: column; align-items: flex-end;
    justify-content: space-between; align-self: stretch; gap: 8px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 2px;
    font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 100px;
  }
  .badge-open  { background: #16a34a; color: #fff; }
  .badge-closed { background: #ef4444; color: #fff; }
  .badge svg { width: 10px; height: 10px; }
  .btn-catalog {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600; color: #92400e;
    background: none; border: none; cursor: pointer;
    transition: opacity var(--transition); white-space: nowrap;
  }
  .btn-catalog:hover { opacity: .7; }
  .btn-catalog svg { width: 12px; height: 12px; }

  /* Animations  */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Staggered card delay helpers */
  .product-card:nth-child(1), .bakery-card:nth-child(1) { animation-delay: .00s; }
  .product-card:nth-child(2), .bakery-card:nth-child(2) { animation-delay: .04s; }
  .product-card:nth-child(3), .bakery-card:nth-child(3) { animation-delay: .08s; }
  .product-card:nth-child(4), .bakery-card:nth-child(4) { animation-delay: .12s; }
  .product-card:nth-child(5), .bakery-card:nth-child(5) { animation-delay: .16s; }
  .product-card:nth-child(6), .bakery-card:nth-child(6) { animation-delay: .20s; }
  .product-card:nth-child(7), .bakery-card:nth-child(7) { animation-delay: .24s; }
  .product-card:nth-child(8), .bakery-card:nth-child(8) { animation-delay: .28s; }
  .product-card:nth-child(9), .bakery-card:nth-child(9) { animation-delay: .32s; }
  .product-card:nth-child(10),.bakery-card:nth-child(10){ animation-delay: .36s; }

  /* ── Responsive ── */
  @media (max-width: 400px) {
    .product-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .product-img { height: 96px; }
  }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<!-- ── Sticky Search Bar ── -->
<div class="search-bar">
  <div class="search-bar-inner">
 
<button class="btn-back" onclick="window.location.href='index.html'" aria-label="Voltar">
  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
  </svg>
</button>

    <div class="search-wrap">
      <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/>
      </svg>
      <input id="searchInput" class="search-input" type="text"
        placeholder="Pesquisar padarias ou produtos..." autocomplete="off" />
      <button class="search-clear" id="clearBtn" aria-label="Limpar">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ── Main ── -->
<div class="main">

  <!-- Toolbar -->
  <div class="toolbar">
    <div></div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="btn-map" id="mapBtn">
        <i class="fa-solid fa-map-location-dot"></i>
        Localizar no Mapa
      </button>
      <button class="btn-filter" id="filterBtn">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" d="M3 6h18M7 12h10M11 18h2"/>
        </svg>
        Filtrar
      </button>
    </div>
  </div>
  <br>
  
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="products" id="tabProducts">
      Produtos <span class="tab-count" id="countProducts">0</span>
    </button>
    <button class="tab-btn" data-tab="bakeries" id="tabBakeries">
      Padarias <span class="tab-count" id="countBakeries">0</span>
    </button>
  </div>

  <!-- Products panel -->
  <div class="panel active" id="panelProducts">
    <div class="product-grid" id="productGrid"></div>
    <div class="empty" id="emptyProducts" style="display:none">
      <div class="empty-icon"><i class="fa-solid fa-magnifying-glass"></i></div>
      Nenhum produto encontrado.
    </div>
  </div>

  <!-- Bakeries panel -->
  <div class="panel" id="panelBakeries">
    <div class="bakery-list" id="bakeryList"></div>
    <div class="empty" id="emptyBakeries" style="display:none">
      <div class="empty-icon"><i class="fa-solid fa-magnifying-glass"></i></div>
      Nenhuma padaria encontrada.
    </div>
  </div>

</div>

<!-- Filter Modal -->
<div class="modal-overlay" id="filterOverlay">
  <div class="modal-sheet">
    <div class="modal-header">
      <span class="modal-title">Filtros</span>
      <button class="modal-close" id="filterClose" aria-label="Fechar">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="modal-body">
      <div class="modal-section" id="sectionProductCat">
        <div class="modal-label">Categoria</div>
        <div class="filter-chips" id="productChips"></div>
      </div>

      <div class="modal-section" id="sectionBakeryStatus">
        <div class="modal-label">Estado</div>
        <div class="filter-chips" id="bakeryChips"></div>
      </div>

      <div class="modal-section">
        <div class="modal-label">
          Preço Máximo
          <span id="priceVal" class="modal-label-value">Sem limite</span>
        </div>
        <input type="range" id="priceSlider" class="range-input" min="0" max="900" step="10" value="900"/>
        <div class="range-ticks"><span>0 MT</span><span>450 MT</span><span>900+ MT</span></div>
      </div>

      <div class="modal-section">
        <div class="modal-label">
          Avaliação Mínima
          <span id="ratingVal" class="modal-label-value">Todas</span>
        </div>
        <input type="range" id="ratingSlider" class="range-input" min="0" max="5" step="0.5" value="0"/>
        <div class="range-ticks"><span>0</span><span>2.5</span><span>5.0</span></div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-clear-modal" id="clearFilters">Limpar Filtros</button>
      <button class="btn-apply-modal" id="applyFilters">Aplicar</button>
    </div>
  </div>
</div>

<script>

const PRODUCTS = [
  { id:1,  name:"Pastel de Nata",          bakery:"Pastelaria Cristal",      category:"Doces",              price:"75,00",  sold:12, units:40, time:20, image:"https://images.unsplash.com/photo-1568051243858-533a607809a5?w=400&h=400&fit=crop&auto=format", tag:"Destaque" }, // produto 1
  { id:2,  name:"Croissant de Manteiga",   bakery:"Bonjour Boulangerie",     category:"Pastéis & Salgados", price:"110,00", sold:5,  units:50, time:30, image:"https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=400&h=400&fit=crop&auto=format", tag:"Novo" },      // produto 2

// BLOCO: FUNÇÕES DE TEXTO (PESQUISA)

// Normaliza uma string: põe em minúsculas e remove acentos/diacríticos,
// para que "pão" e "pao" (ou "Pão") sejam tratados como equivalentes na pesquisa.
function normalize(str) {
  return str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); // NFD separa letra+acento; a regex remove só os acentos (categoria Unicode de marcas diacríticas)
} // fim normalize

// Verifica se cada palavra escrita pelo utilizador (q) corresponde ao início
// de alguma palavra do nome (name). Permite pesquisar "pa ce" e encontrar
// "Pastelaria Cristal", por exemplo, porque "pa" é início de "pastelaria" e "ce" não bate... 
// (na prática serve para pesquisas por iniciais/abreviações dos nomes das padarias).
function matchesInitials(name, q) {
  if (!q) return true;                                   // se não há texto de pesquisa, considera que bate sempre
  const nameWords = normalize(name).split(/\s+/);          // separa o nome da padaria em palavras (já normalizado, sem acentos)
  const qWords = q.split(/\s+/).filter(Boolean);            // separa o texto pesquisado em palavras, removendo strings vazias
  return qWords.every(qw => nameWords.some(word => word.startsWith(qw))); // exige que CADA palavra pesquisada (qWords) seja início de PELO MENOS UMA palavra do nome
} // fim matchesInitials

// ============================================================
// BLOCO: FILTRAGEM DE DADOS
// ============================================================
// Devolve a lista de produtos que cumprem: texto de pesquisa + categoria + preço máximo.
function filteredProducts() {
  const q = normalize(state.query.trim());                  // normaliza o texto de pesquisa (minúsculas, sem acentos, sem espaços nas pontas)
  return PRODUCTS.filter(p => {
    const matchQ = !q || normalize(p.name).startsWith(q);    // produto entra se não há pesquisa, ou se o nome do produto começa pelo texto pesquisado
    const matchF = state.productFilter === "Todos" || p.category === state.productFilter; // produto entra se o filtro é "Todos" ou se a categoria coincide
    const price = parseFloat(p.price.replace(",", "."));      // converte o preço de string "75,00" (formato PT) para número 75.00 (formato JS)
    return matchQ && matchF && price <= state.maxPrice;        // só entra se cumprir as três condições: texto, categoria e tecto de preço
  });
} // fim filteredProducts

// Devolve a lista de padarias que cumprem: texto de pesquisa (por iniciais) + estado (aberta/fechada) + avaliação mínima.
function filteredBakeries() {
  const q = normalize(state.query.trim());                   // normaliza o texto de pesquisa
  return BAKERIES.filter(b => {
    const matchQ = !q || matchesInitials(b.name, q);          // padaria entra se não há pesquisa, ou se o nome bate por iniciais
    const matchF = state.bakeryFilter === "Todas"               // padaria entra se o filtro é "Todas"...
      || (state.bakeryFilter === "Abertas"  &&  b.open)          // ...ou se o filtro é "Abertas" e a padaria está aberta...
      || (state.bakeryFilter === "Fechadas" && !b.open);          // ...ou se o filtro é "Fechadas" e a padaria está fechada
    return matchQ && matchF && b.rating >= state.minRating;       // só entra se cumprir pesquisa, estado e avaliação mínima
  });
} // fim filteredBakeries

// BLOCO: RENDERIZAÇÃO DOS CHIPS DE FILTRO
// ============================================================
// Gera os botões "chip" de categoria de produto e de estado de padaria,
// marcando como "active" o chip que corresponde ao filtro actualmente seleccionado.
// Os onclick chamam funções globais (window.setProductFilter / window.setBakeryFilter)
// definidas mais abaixo, porque o HTML é gerado como texto e o atributo onclick
// só consegue invocar funções acessíveis globalmente.
function renderChips() {
  productChips.innerHTML = PRODUCT_CATS.map(cat =>
    `<button class="chip ${state.productFilter === cat ? 'active' : ''}" onclick="setProductFilter('${cat}')">${cat}</button>`
  ).join(""); // gera um botão por categoria e junta tudo numa única string HTML
  bakeryChips.innerHTML = BAKERY_STATUS.map(s =>
    `<button class="chip ${state.bakeryFilter === s ? 'active' : ''}" onclick="setBakeryFilter('${s}')">${s}</button>`
  ).join(""); // gera um botão por estado e junta tudo numa única string HTML
}

// BLOCO: RENDER PRINCIPAL (ORQUESTRADOR)

// Função "mestre" chamada sempre que algo muda (pesquisa, filtro, separador, slider).
// Recalcula os resultados filtrados e actualiza todos os elementos do ecrã.
function render() {
  const prods = filteredProducts();         // obtém produtos já filtrados com o estado actual
  const baks  = filteredBakeries();          // obtém padarias já filtradas com o estado actual
  const onProductsTab = state.tab === "products"; // true se a aba activa é "Produtos"

  countProducts.textContent = prods.length;   // actualiza o número mostrado no badge da aba Produtos
  countBakeries.textContent = baks.length;     // actualiza o número mostrado no badge da aba Padarias

  panelProducts.classList.toggle("active", onProductsTab);   // mostra/esconde o painel de produtos consoante a aba activa
  panelBakeries.classList.toggle("active", !onProductsTab);   // mostra/esconde o painel de padarias (o inverso do anterior)
  tabProducts.classList.toggle("active", onProductsTab);       // destaca visualmente o botão da aba Produtos se estiver activo
  tabBakeries.classList.toggle("active", !onProductsTab);       // destaca visualmente o botão da aba Padarias se estiver activo

  if (sectionProductCat) sectionProductCat.style.display = onProductsTab ? "flex" : "none"; // no modal de filtros, só mostra "Categoria" quando a aba é Produtos
  if (sectionBakeryStat) sectionBakeryStat.style.display = onProductsTab ? "none" : "flex";  // e só mostra "Estado" quando a aba é Padarias

  const hasActive = state.productFilter !== "Todos" || state.bakeryFilter !== "Todas" || state.maxPrice < 900 || state.minRating > 0; // verifica se algum filtro está activo (diferente do valor por omissão)
  filterBtn.classList.toggle("active", hasActive); // dá destaque visual ao botão "Filtrar" quando há filtros aplicados

  renderChips();           // redesenha os chips de filtro (para reflectir qual está activo)
  renderProducts(prods);    // redesenha a grelha de produtos com a lista filtrada
  renderBakeries(baks);      // redesenha a lista de padarias com a lista filtrada
} 


// BLOCO: EVENTOS — PESQUISA

// Sempre que o utilizador escreve na caixa de pesquisa, actualiza o estado,
// mostra/esconde o botão "limpar" e volta a renderizar tudo.
searchInput.addEventListener("input", e => { state.query = e.target.value; clearBtn.classList.toggle("visible", !!state.query); render(); });
// Ao clicar no "X", limpa o texto da pesquisa, esconde o botão de limpar, devolve o foco à caixa e renderiza de novo.
clearBtn.addEventListener("click", () => { state.query = ""; searchInput.value = ""; clearBtn.classList.remove("visible"); searchInput.focus(); render(); });


// BLOCO: EVENTOS — MODAL DE FILTROS

filterBtn.addEventListener("click", () => filterOverlay.classList.add("open"));     // clicar em "Filtrar" abre o modal (adiciona a classe "open")
filterClose.addEventListener("click", () => filterOverlay.classList.remove("open")); // clicar no "X" do modal fecha-o
filterOverlay.addEventListener("click", e => { if(e.target===filterOverlay) filterOverlay.classList.remove("open"); }); // clicar fora do "cartão" do modal (no fundo escurecido) também fecha — só se o clique foi directamente no overlay, não nos filhos

// Sempre que o slider de preço é movido, actualiza o estado e o texto mostrado, e renderiza de novo.
priceSlider.addEventListener("input", () => {
  const v = parseInt(priceSlider.value);                          // lê o valor actual do slider como número inteiro
  state.maxPrice = v;                                              // guarda esse valor no estado
  priceVal.textContent = v >= 900 ? "Sem limite" : "Até " + v + " MT"; // no valor máximo (900) mostra "Sem limite"; caso contrário mostra "Até X MT"
  render();                                                         // recalcula e redesenha tudo
});
// Sempre que o slider de avaliação é movido, actualiza o estado e o texto mostrado, e renderiza de novo.
ratingSlider.addEventListener("input", () => {
  state.minRating = parseFloat(ratingSlider.value);                          // lê o valor actual do slider como número decimal (ex.: 3.5)
  ratingVal.textContent = state.minRating > 0 ? state.minRating.toFixed(1) + "+" : "Todas"; // mostra "X.X+" se houver um mínimo definido, ou "Todas" se for 0
  render();                                                                    // recalcula e redesenha tudo
});
// Botão "Limpar Filtros": repõe todos os filtros e sliders para os valores por omissão.
clearFiltersBtn.addEventListener("click", () => {
  state.productFilter = "Todos"; state.bakeryFilter = "Todas"; // repõe os filtros de categoria/estado
  state.maxPrice = 900; state.minRating = 0;                    // repõe os limites de preço e avaliação
  priceSlider.value = 900; priceVal.textContent = "Sem limite"; // sincroniza visualmente o slider e o texto de preço
  ratingSlider.value = 0; ratingVal.textContent = "Todas";      // sincroniza visualmente o slider e o texto de avaliação
  render();                                                      // recalcula e redesenha tudo
});
// Botão "Aplicar": como o estado já é actualizado em tempo real pelos próprios sliders/chips, este botão só fecha o modal.
applyFiltersBtn.addEventListener("click", () => filterOverlay.classList.remove("open"));


// BLOCO: EVENTOS — ABAS (TABS)

// Para cada botão de aba (Produtos/Padarias), regista um clique que muda
// o separador activo no estado (lido do atributo data-tab) e renderiza de novo.
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => { state.tab = btn.dataset.tab; render(); });
});


// BLOCO: FUNÇÕES GLOBAIS PARA OS CHIPS


window.setProductFilter = cat => { state.productFilter = cat; render(); }; // muda o filtro de categoria de produto e redesenha
window.setBakeryFilter  = s   => { state.bakeryFilter = s;   render(); };  // muda o filtro de estado de padaria e redesenha


// BLOCO: INICIALIZAÇÃO

priceVal.textContent = "Sem limite"; // garante o texto inicial correcto do slider de preço antes da primeira renderização
render();                             // primeira renderização da página, assim que o script corre

</script>
</body>
</html>
